name: Deploy ST-Move_files_for_Salesforce_CRM

on:
  push:
    # Use sandbox for testing. Change to [ main ] for prod if needed.
    branches: [ sandbox ]
    paths:
      - 'ST-Move_files_for_Salesforce_CRM/**'
      - '.github/workflows/deploy-ST-Move_files_for_Salesforce_CRM.yml'
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Ensure zip and unzip are installed
        run: |
          if ! command -v zip >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y zip unzip
          fi

      # Only zip the Salesforce CRM Lambda folder
      - name: Create deployment package
        working-directory: ./ST-Move_files_for_Salesforce_CRM
        run: |
          zip -r ../ST-Move_files_for_Salesforce_CRM.zip .

      # Optional sanity check of the deployment package
      - name: List files in deployment package
        run: unzip -l ST-Move_files_for_Salesforce_CRM.zip

      - name: Update Lambda function code
        uses: imehedi/actions-awscli-v2@latest
        with:
          args: >
            lambda update-function-code
            --function-name arn:aws:lambda:ca-central-1:839358208765:function:ST-Move_files_for_Salesforce_CRM
            --zip-file fileb://ST-Move_files_for_Salesforce_CRM.zip
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ca-central-1